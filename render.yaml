services:
  - type: web
    name: zoo-guide-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: adk web --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL
        value: gemini-2.5-flash
      - key: GOOGLE_API_KEY
        sync: false   # Render dashboard mein manually set karna hoga
